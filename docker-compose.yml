services:
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: farmsystem-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Password123!
    ports:
      - "1433:1433"
    volumes:
      - sqlvolume:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Password123!' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - farmsystem-network

  backend:
    build: ./backend/FarmSystemProject 
    container_name: farmsystem-backend
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=database;Database=FarmSystemDb;User Id=sa;Password=Password123!;TrustServerCertificate=True;
    networks:
      - farmsystem-network
    
  frontend:
    build:
      context: ./frontend/FarmSystemProject
      dockerfile: Dockerfile
    container_name: farmsystem-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - farmsystem-network

volumes:
  sqlvolume:

networks:
  farmsystem-network:
    driver: bridge